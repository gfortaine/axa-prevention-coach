name: Deploy web to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-web.yml

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for GitHub Actions Vercel deployment."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure Vercel secrets or disable this workflow if Vercel Git Integration is the deployment source of truth."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: apps/web
      - run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
      - run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
